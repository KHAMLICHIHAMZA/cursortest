# E2E Playwright contre la préprod — exécution automatique, sans checklist locale.
#
# GitHub → Settings → Secrets and variables → Actions :
#   Secret  E2E_PREPROD_ADMIN_PASSWORD  (obligatoire)
# Variable optionnelle : E2E_PREPROD_ADMIN_EMAIL (sinon défaut code)
# URLs : défauts Vercel/OnRender dans playwright.config ; surcharge via env du runner si besoin.
#
# Sans secret : échec login immédiat (pas de mot de passe recette en dur en CI).

name: Frontend Web - E2E préprod

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'
      - '.github/workflows/ci-frontend-web-e2e-preprod.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'
      - '.github/workflows/ci-frontend-web-e2e-preprod.yml'
  workflow_dispatch:

concurrency:
  group: frontend-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-preprod:
    name: Playwright (Vercel + OnRender)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    defaults:
      run:
        working-directory: frontend-web
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E préprod
        env:
          GITHUB_ACTIONS: 'true'
          E2E_ADMIN_EMAIL: ${{ vars.E2E_PREPROD_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_PREPROD_ADMIN_PASSWORD }}
        run: npm run test:e2e
