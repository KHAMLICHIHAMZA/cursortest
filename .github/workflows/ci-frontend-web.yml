name: Frontend Web - lint & build

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'
      - '.github/workflows/ci-frontend-web.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'
      - '.github/workflows/ci-frontend-web.yml'
  workflow_dispatch:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com/api/v1
