name: CI Complet - Tous les Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    uses: ./.github/workflows/ci-backend.yml
    secrets: inherit

  mobile:
    name: Mobile Tests
    uses: ./.github/workflows/ci-mobile.yml
    secrets: inherit

  frontend-web:
    name: Frontend Web lint & build
    uses: ./.github/workflows/ci-frontend-web.yml

  full-integration:
    name: Intégration API (smoke HTTP)
    runs-on: ubuntu-latest
    needs: [backend, mobile, frontend-web]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: malocauto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Backend (migrate, seed, build)
        working-directory: ./backend
        run: |
          npm ci
          npm run prisma:generate
          npx prisma migrate deploy
          npm run prisma:seed
          npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/malocauto_test
          DIRECT_URL: postgresql://test:test@localhost:5432/malocauto_test

      - name: Start Backend (sans nouveau migrate — déjà appliqué)
        working-directory: ./backend
        run: |
          node dist/main &
          echo $! > /tmp/backend.pid
          sleep 2
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/malocauto_test
          DIRECT_URL: postgresql://test:test@localhost:5432/malocauto_test
          JWT_SECRET: test-secret-key
          JWT_REFRESH_SECRET: test-refresh-secret-key
          PORT: 3000
          NODE_ENV: test
          FRONTEND_WEB_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3001

      - name: Run integration smoke (health + ready + login seed)
        working-directory: ./backend
        run: node scripts/ci-integration-smoke.mjs
        env:
          SMOKE_API_BASE: http://localhost:3000/api/v1

      - name: Stop Backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill $(cat /tmp/backend.pid) 2>/dev/null || true; fi
          pkill -f "node dist/main" || true
