# Blueprint Render — backend API (monorepo)
# Dashboard: lier ce dépôt ou « Apply » le blueprint pour appliquer build/start.
# https://render.com/docs/blueprint-spec
#
# Prérequis: DATABASE_URL + DIRECT_URL sur le service.
# Avec Neon : DATABASE_URL = endpoint *pooler* (-pooler), DIRECT_URL = endpoint direct (sans -pooler).
# Sans DIRECT_URL, prisma migrate deploy timeout sur pg_advisory_lock via le pooler (P1002).
# Démarrage: migrations puis Node (sans `npm start` pour éviter les lignes
# « npm error … SIGTERM » quand Render remplace le conteneur au déploiement — normal).
# Dashboard: si le blueprint n’est pas lié, copie cette commande dans Start Command.
# Ne pas retirer `prisma migrate deploy` : sinon schéma Prisma et DB prod divergent
# (ex. colonne User.phone manquante → 500 sur GET /companies/:id, ou Vehicle.maintenanceAlertIntervalKm
# manquante → 500 sur listes véhicules). Déployer toujours le dossier prisma/migrations à jour.
# Après déploiement : `npm run smoke:remote` dans backend avec SMOKE_API_BASE (+ JWT optionnel).

services:
  - type: web
    name: malocauto-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/health
