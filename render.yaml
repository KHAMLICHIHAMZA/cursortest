# Blueprint Render — backend API (monorepo)
# Dashboard: lier ce dépôt ou « Apply » le blueprint pour appliquer build/start.
# https://render.com/docs/blueprint-spec
#
# Prérequis: DATABASE_URL (PostgreSQL Render) sur le service.
# Démarrage: migrations puis Node (sans `npm start` pour éviter les lignes
# « npm error … SIGTERM » quand Render remplace le conteneur au déploiement — normal).
# Dashboard: si le blueprint n’est pas lié, copie cette commande dans Start Command.

services:
  - type: web
    name: malocauto-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/health
